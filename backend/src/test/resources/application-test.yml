spring:
  application:
    name: trading-platform-test

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect

  liquibase:
    enabled: false

  kafka:
    bootstrap-servers: localhost:9092
    listener:
      auto-startup: false
    admin:
      auto-create: false

  data:
    redis:
      host: localhost
      port: 6379

  threads:
    virtual:
      enabled: true

jwt:
  secret: "VGhpcyBpcyBhIHZlcnkgc2VjdXJlIHNlY3JldCBrZXkgZm9yIEpXVCAyNTYgYml0cw=="
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

logging:
  level:
    com.tradingplatform: DEBUG
