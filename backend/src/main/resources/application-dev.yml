server:
  port: 8080

spring:
  application:
    name: trading-platform

  datasource:
    url: jdbc:mysql://localhost:3306/trading_platform_dev?createDatabaseIfNotExist=true
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    properties:
      hibernate:
        type:
          preferred_boolean_jdbc_type: TINYINT
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml

  data:
    redis:
      host: localhost
      port: 6379
      password:

  threads:
    virtual:
      enabled: true

logging:
  level:
    com.tradingplatform: DEBUG
    org.springframework.security: DEBUG
